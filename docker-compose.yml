version: "3.8"

services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    depends_on:
      - mongodb
      - redis
    environment:
      - PORT=4000
      - MONGODB_URI=mongodb://mongodb:27017/couple-chat
      - REDIS_URL=redis://redis:6379

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    depends_on:
      - mongodb
      - redis
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/couple-chat
      - REDIS_URL=redis://redis:6379

volumes:
  mongodb_data:
